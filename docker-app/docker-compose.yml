services:
  postgres:
    image: postgres:16-alpine
    container_name: tokomf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tokomf
      POSTGRES_PASSWORD: tokomf_secret
      POSTGRES_DB: tokomf
    volumes:
      - tokomf-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokomf -d tokomf"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tokomf-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tokomf:tokomf_secret@postgres:5432/tokomf?schema=public
      NEXTAUTH_URL: http://localhost:3103
      NEXTAUTH_SECRET: change-me-in-production-please-32chars-min
      NODE_ENV: production
    ports:
      - "3103:3103"

volumes:
  tokomf-data:
